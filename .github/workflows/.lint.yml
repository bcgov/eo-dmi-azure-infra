name: (Reusable) Lint

# Reusable workflow called by pr-validate.yml on every pull request.
# Runs static checks across the whole repo — no Azure credentials needed.
# Any failure here blocks the PR before Terraform even tries to plan.
#
# Checks in order:
#   1. terraform fmt  — formatting (cosmetic, but keeps diffs clean)
#   2. terraform validate — syntax + type checking for every module and stack
#   3. tflint — Terraform-specific linting (deprecated args, missing vars, etc.)
#   4. checkov — security/compliance policy scanning (CIS, NIST, etc.)

on:
  workflow_call: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Fails if any .tf file is not formatted. Run `terraform fmt -recursive`
      # locally to auto-fix before pushing.
      - name: terraform fmt
        run: terraform fmt -check -recursive

      # Validates each module in isolation (no backend, no real provider calls).
      # `::group::` / `::endgroup::` collapse the per-module output in the
      # GitHub Actions log so it's easy to expand only the failing one.
      - name: terraform validate (modules)
        run: |
          for dir in modules/*/; do
            echo "::group::validate $dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

      # Same for stacks. stacks/bootstrap/* are sub-directories so the glob
      # covers both stacks/tenant/, stacks/shared/, and stacks/bootstrap/*/
      # The `[ -f "$dir/main.tf" ]` guard skips directories that aren't stacks
      # (e.g. stacks/bootstrap itself, which has no main.tf of its own).
      - name: terraform validate (stacks)
        run: |
          for dir in stacks/*/ stacks/bootstrap/*/; do
            [ -f "$dir/main.tf" ] || continue
            echo "::group::validate $dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

      - uses: terraform-linters/setup-tflint@v4

      # tflint --init downloads provider-specific rules (e.g. azurerm plugin).
      # --recursive walks all subdirectories.
      - name: tflint
        run: |
          tflint --init
          tflint --recursive

      # Checkov scans for misconfigurations against a large library of policies
      # (storage accounts with public access, key vaults without soft-delete, etc.).
      # `quiet: true` suppresses passed checks so the output is easier to read.
      - name: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          quiet: true
